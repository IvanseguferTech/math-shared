name: Pack and Deploy
run-name: Pack and Deploy by ${{ github.actor }}

on:
    push:
        branches: [ "main" ]

env:
    DOTNET_VERSION: "10.0.x"
    buildConfiguration: Release

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        permissions:
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: ${{ env.DOTNET_VERSION }}
            
            - name: Restore
              run: dotnet restore
            
            - name: Build
              run: dotnet build --configuration ${{ env.buildConfiguration }} --no-restore

            - name: Pack
              run: dotnet pack --configuration ${{ env.buildConfiguration }} --no-build --output ./nupkg

            - name: Push to Github Packages
              run: |
                dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} \
                    --source "https://nuget.pkg.github.com/IvanseguferTech/index.json
                    --skip-duplicate