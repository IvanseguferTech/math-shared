name: Code coverage
run-name: Code coverage

on:
    pull_request:
        branches: [ "main" ]

    workflow_dispatch:

jobs:
    code-coverage:
        name: Code Coverage
        uses: IvanseguferTech/CommonAnalysis/.github/workflows/code-coverage.yml@main
        with:
            min_limit: ${{ vars.COVERAGE_MIN_LIMIT }}
            max_limit: ${{ vars.COVERAGE_MAX_LIMIT }}